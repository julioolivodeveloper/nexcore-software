<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facturas - Contabilidad</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fa;
      color: #333;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      overflow-y: auto;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .nav-menu {
      list-style: none;
    }

    .nav-item {
      margin-bottom: 10px;
    }

    .nav-link {
      display: block;
      padding: 12px;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s;
    }

    .nav-link:hover, .nav-link.active {
      background: rgba(255, 255, 255, 0.2);
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: white;
      padding: 20px 30px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
    }

    table {
      width: 100%;
      background: white;
      border-collapse: collapse;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      overflow: hidden;
    }

    th {
      background: #f5f7fa;
      padding: 15px;
      text-align: left;
      font-weight: 600;
      color: #666;
      border-bottom: 2px solid #e0e0e0;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid #e0e0e0;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 8px;
      width: 90%;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 15px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      font-family: inherit;
    }

    .items-section {
      margin: 20px 0;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 5px;
    }

    .item-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr auto;
      gap: 10px;
      margin-bottom: 10px;
      align-items: end;
    }

    .item-row input {
      margin-bottom: 0;
    }

    .btn-small {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }

    .btn-add-item {
      background: #27ae60;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    .summary {
      display: flex;
      justify-content: flex-end;
      gap: 30px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
      font-size: 14px;
    }

    .summary div {
      text-align: right;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: flex-end;
    }

    .btn-secondary {
      background: #e0e0e0;
      color: #333;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn-action {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      margin-right: 10px;
      padding: 5px 10px;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-draft {
      background: #f39c12;
      color: white;
    }

    .status-paid {
      background: #27ae60;
      color: white;
    }

    .logout-btn {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: calc(100% - 40px);
    }
  </style>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="logo">📊 Contabilidad</div>
      <ul class="nav-menu">
        <li class="nav-item"><a href="/accounting/dashboard" class="nav-link">📈 Dashboard</a></li>
        <li class="nav-item"><a href="/accounting/invoices" class="nav-link active">📄 Facturas</a></li>
        <li class="nav-item"><a href="/accounting/clients" class="nav-link">👥 Clientes</a></li>
        <li class="nav-item"><a href="/accounting/reports" class="nav-link">📋 Reportes</a></li>
      </ul>
      <button class="logout-btn" onclick="logout()">🚪 Cerrar Sesión</button>
    </aside>

    <main class="main">
      <header class="header">
        <h1>Facturas</h1>
        <button class="btn-primary" onclick="openModal()">➕ Nueva Factura</button>
      </header>

      <div class="content">
        <table id="invoicesTable">
          <thead>
            <tr>
              <th>Número</th>
              <th>Cliente</th>
              <th>Fecha</th>
              <th>Total</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="invoicesBody">
            <tr><td colspan="6" style="text-align: center; color: #999;">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal" id="invoiceModal">
    <div class="modal-content">
      <div style="font-size: 20px; font-weight: bold; margin-bottom: 20px;">Nueva Factura</div>
      <form id="invoiceForm" onsubmit="saveInvoice(event)">
        <input type="hidden" id="invoiceId">

        <div class="form-row">
          <div class="form-group">
            <label>Cliente *</label>
            <select id="client_id" required>
              <option value="">Seleccionar cliente...</option>
            </select>
          </div>
          <div class="form-group">
            <label>Fecha de Vencimiento</label>
            <input type="date" id="due_date">
          </div>
        </div>

        <div class="items-section">
          <div style="font-weight: bold; margin-bottom: 15px;">Ítems de Factura</div>
          <div id="itemsContainer"></div>
          <button type="button" class="btn-add-item" onclick="addItem()">➕ Agregar Ítem</button>
        </div>

        <div class="form-group">
          <label>Notas</label>
          <textarea id="notes" rows="3" placeholder="Notas adicionales..."></textarea>
        </div>

        <div class="summary" id="summary">
          <div>
            <div style="color: #999; font-size: 12px; margin-bottom: 5px;">Subtotal</div>
            <div style="font-size: 16px; font-weight: bold;" id="subtotal">$0.00</div>
          </div>
          <div>
            <div style="color: #999; font-size: 12px; margin-bottom: 5px;">IVA (13%)</div>
            <div style="font-size: 16px; font-weight: bold;" id="tax">$0.00</div>
          </div>
          <div>
            <div style="color: #999; font-size: 12px; margin-bottom: 5px;">Total</div>
            <div style="font-size: 18px; font-weight: bold; color: #667eea;" id="total">$0.00</div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-secondary" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn-primary">Guardar Factura</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let clients = [];
    let invoices = [];

    async function loadClients() {
      try {
        const response = await fetch('/api/clients');
        clients = await response.json();
        const select = document.getElementById('client_id');
        select.innerHTML = '<option value="">Seleccionar cliente...</option>';
        clients.forEach(c => {
          const option = document.createElement('option');
          option.value = c.id;
          option.textContent = c.name;
          select.appendChild(option);
        });
      } catch (err) {
        console.error('Error:', err);
      }
    }

    async function loadInvoices() {
      try {
        const response = await fetch('/api/invoices');
        invoices = await response.json();
        displayInvoices();
      } catch (err) {
        console.error('Error:', err);
      }
    }

    function displayInvoices() {
      const tbody = document.getElementById('invoicesBody');
      if (invoices.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">Sin facturas registradas</td></tr>';
        return;
      }

      tbody.innerHTML = invoices.map(inv => `
        <tr>
          <td>${inv.invoice_number}</td>
          <td>${inv.client_name || '-'}</td>
          <td>${new Date(inv.issue_date).toLocaleDateString('es-ES')}</td>
          <td>$${parseFloat(inv.total).toFixed(2)}</td>
          <td><span class="status-badge status-${inv.status}">${inv.status.toUpperCase()}</span></td>
          <td>
            <button class="btn-action" onclick="downloadPDF(${inv.id})">📥 PDF</button>
            <button class="btn-action" onclick="deleteInvoice(${inv.id})" style="color: #e74c3c;">🗑️</button>
          </td>
        </tr>
      `).join('');
    }

    function openModal() {
      document.getElementById('invoiceId').value = '';
      document.getElementById('invoiceForm').reset();
      addItem();
      document.getElementById('invoiceModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('invoiceModal').classList.remove('active');
    }

    function addItem() {
      const container = document.getElementById('itemsContainer');
      const itemCount = container.children.length;
      const itemId = `item_${Date.now()}`;

      const row = document.createElement('div');
      row.className = 'item-row';
      row.id = itemId;
      row.innerHTML = `
        <input type="text" placeholder="Descripción del servicio..." class="item-description">
        <input type="number" placeholder="Cantidad" class="item-quantity" value="1" min="1">
        <input type="number" placeholder="Precio" class="item-price" step="0.01" min="0">
        <input type="text" readonly class="item-amount" style="background: #f0f0f0;">
        <button type="button" class="btn-small" onclick="removeItem('${itemId}')">X</button>
      `;
      container.appendChild(row);

      const quantity = row.querySelector('.item-quantity');
      const price = row.querySelector('.item-price');

      [quantity, price].forEach(el => {
        el.addEventListener('change', calculateTotal);
        el.addEventListener('keyup', calculateTotal);
      });
    }

    function removeItem(itemId) {
      document.getElementById(itemId).remove();
      calculateTotal();
    }

    function calculateTotal() {
      let subtotal = 0;
      document.querySelectorAll('.item-row').forEach(row => {
        const qty = parseFloat(row.querySelector('.item-quantity').value) || 0;
        const price = parseFloat(row.querySelector('.item-price').value) || 0;
        const amount = qty * price;
        row.querySelector('.item-amount').value = `$${amount.toFixed(2)}`;
        subtotal += amount;
      });

      const tax = subtotal * 0.13;
      const total = subtotal + tax;

      document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
      document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
      document.getElementById('total').textContent = `$${total.toFixed(2)}`;
    }

    async function saveInvoice(e) {
      e.preventDefault();

      const items = [];
      document.querySelectorAll('.item-row').forEach(row => {
        const description = row.querySelector('.item-description').value;
        const quantity = parseFloat(row.querySelector('.item-quantity').value) || 0;
        const unit_price = parseFloat(row.querySelector('.item-price').value) || 0;

        if (description && quantity && unit_price) {
          items.push({ description, quantity, unit_price });
        }
      });

      if (items.length === 0) {
        alert('Agregue al menos un ítem');
        return;
      }

      const data = {
        client_id: document.getElementById('client_id').value,
        due_date: document.getElementById('due_date').value,
        notes: document.getElementById('notes').value,
        items
      };

      try {
        const response = await fetch('/api/invoices', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          closeModal();
          loadInvoices();
        }
      } catch (err) {
        console.error('Error:', err);
      }
    }

    async function downloadPDF(invoiceId) {
      window.open(`/api/invoices/${invoiceId}/pdf`, '_blank');
    }

    async function deleteInvoice(id) {
      if (!confirm('¿Está seguro?')) return;
      try {
        await fetch(`/api/invoices/${id}`, { method: 'DELETE' });
        loadInvoices();
      } catch (err) {
        console.error('Error:', err);
      }
    }

    async function logout() {
      try {
        await fetch('/api/auth/logout', { method: 'POST' });
        window.location.href = '/accounting/login';
      } catch (err) {
        console.error('Error:', err);
      }
    }

    window.addEventListener('load', () => {
      loadClients();
      loadInvoices();
    });

    document.getElementById('invoiceModal').addEventListener('click', (e) => {
      if (e.target.id === 'invoiceModal') closeModal();
    });
  </script>
</body>
</html>
