<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Contabilidad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #2563eb; --purple-l: #60a5fa; --cyan: #06b6d4; --green: #10b981;
      --yellow: #f59e0b; --pink: #ec4899;
      --bg: #07070f; --bg2: #0e0e1c; --bg3: #13132a;
      --border: rgba(255,255,255,0.07); --text-muted: #94a3b8; --radius: 16px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: #e2e8f0; display: flex; height: 100vh; overflow: hidden; }

    /* SIDEBAR */
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 24px 16px;
    }
    .sidebar-logo {
      display: flex; align-items: center; gap: 10px;
      padding: 0 8px 24px; border-bottom: 1px solid var(--border); margin-bottom: 20px;
    }
    .logo-hex {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .sidebar-logo span { font-family: 'Space Grotesk', sans-serif; font-size: .95rem; font-weight: 700; color: #fff; }
    .nav-section-label { font-size: .68rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #475569; padding: 0 8px; margin-bottom: 6px; }
    .nav-menu { list-style: none; display: flex; flex-direction: column; gap: 2px; margin-bottom: 20px; }
    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px;
      color: var(--text-muted); font-size: .875rem; font-weight: 500;
      text-decoration: none; transition: background .2s, color .2s;
    }
    .nav-link svg { width: 17px; height: 17px; flex-shrink: 0; }
    .nav-link:hover { background: rgba(255,255,255,.05); color: #e2e8f0; }
    .nav-link.active { background: rgba(37,99,235,.15); color: var(--purple-l); border: 1px solid rgba(37,99,235,.2); }
    .sidebar-footer { margin-top: auto; }
    .logout-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 10px 12px; border-radius: 10px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-muted); font-size: .875rem; font-weight: 500;
      cursor: pointer; transition: background .2s, color .2s, border-color .2s;
    }
    .logout-btn svg { width: 17px; height: 17px; }
    .logout-btn:hover { background: rgba(239,68,68,.08); border-color: rgba(239,68,68,.25); color: #fca5a5; }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 16px 28px; display: flex; align-items: center; justify-content: space-between;
    }
    .topbar h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 700; }
    .user-badge {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px; border-radius: 999px;
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      font-size: .8rem; color: var(--text-muted);
    }
    .user-badge svg { width: 14px; height: 14px; color: var(--purple-l); }
    .content { flex: 1; overflow-y: auto; padding: 28px; }

    .si-red  { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.2); color: #fca5a5; }
    /* CARDS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 22px; transition: border-color .3s, transform .3s;
    }
    .stat-card:hover { border-color: rgba(37,99,235,.3); transform: translateY(-3px); }
    .stat-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; margin-bottom: 14px;
    }
    .stat-icon svg { width: 20px; height: 20px; }
    .si-blue { background: rgba(37,99,235,.15); border: 1px solid rgba(37,99,235,.2); color: var(--purple-l); }
    .si-cyan { background: rgba(6,182,212,.15); border: 1px solid rgba(6,182,212,.2); color: #67e8f9; }
    .si-green { background: rgba(16,185,129,.15); border: 1px solid rgba(16,185,129,.2); color: #6ee7b7; }
    .si-yellow { background: rgba(245,158,11,.15); border: 1px solid rgba(245,158,11,.2); color: #fcd34d; }
    .stat-label { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin-bottom: 6px; }
    .stat-value { font-family: 'Space Grotesk', sans-serif; font-size: 1.9rem; font-weight: 700; color: #fff; }

    /* TABLE / CHART PANEL */
    .panel { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .panel-title { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 600; }
    .panel-badge { font-size: .72rem; font-weight: 700; padding: 4px 10px; border-radius: 999px; background: rgba(37,99,235,.12); color: var(--purple-l); border: 1px solid rgba(37,99,235,.2); }
    .revenue-list { list-style: none; display: flex; flex-direction: column; gap: 0; }
    .revenue-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 13px 0; border-bottom: 1px solid var(--border);
      font-size: .875rem;
    }
    .revenue-item:last-child { border-bottom: none; }
    .revenue-month { color: var(--text-muted); }
    .revenue-amount { font-weight: 600; color: #6ee7b7; font-family: 'Space Grotesk', sans-serif; }
    .empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-size: .875rem; }
    .empty-state svg { width: 36px; height: 36px; margin: 0 auto 12px; opacity: .4; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-hex">⬡</div>
      <span>Contabilidad</span>
    </div>
    <div class="nav-section-label">Menú</div>
    <ul class="nav-menu">
      <li><a href="/accounting/dashboard" class="nav-link active"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
      <li><a href="/accounting/invoices" class="nav-link"><i data-lucide="file-text"></i> Facturas</a></li>
      <li><a href="/accounting/clients" class="nav-link"><i data-lucide="users"></i> Clientes</a></li>
      <li><a href="/accounting/expenses"   class="nav-link"><i data-lucide="credit-card"></i> Gastos</a></li>
      <li><a href="/accounting/financials" class="nav-link"><i data-lucide="trending-up"></i> Financiero</a></li>
      <li><a href="/accounting/reports"    class="nav-link"><i data-lucide="bar-chart-2"></i> Reportes</a></li>
    </ul>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()"><i data-lucide="log-out"></i> Cerrar Sesión</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1>Dashboard</h1>
      <div class="user-badge"><i data-lucide="user"></i><span id="userEmail">—</span></div>
    </div>
    <div class="content">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon si-green"><i data-lucide="dollar-sign"></i></div>
          <div class="stat-label">Ingresos Totales</div>
          <div class="stat-value" id="totalRevenue">$0</div>
        </div>
        <div class="stat-card" style="cursor:pointer" onclick="window.location='/accounting/expenses'">
          <div class="stat-icon si-red"><i data-lucide="trending-down"></i></div>
          <div class="stat-label">Total Gastos</div>
          <div class="stat-value" id="totalExpenses">$0</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon si-cyan"><i data-lucide="activity"></i></div>
          <div class="stat-label">Ingreso Neto</div>
          <div class="stat-value" id="netIncome">$0</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon si-yellow"><i data-lucide="clock"></i></div>
          <div class="stat-label">Pendientes</div>
          <div class="stat-value" id="pendingInvoices">0</div>
        </div>
      </div>

      <!-- Acceso rápido -->
      <div style="display:flex;gap:10px;margin-bottom:4px">
        <button onclick="window.location='/accounting/invoices'" style="display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.2);color:#60a5fa;font-size:.85rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s"><svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><line x1='12' y1='5' x2='12' y2='19'/><line x1='5' y1='12' x2='19' y2='12'/></svg> Nueva Factura</button>
        <button onclick="window.location='/accounting/expenses'" style="display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5;font-size:.85rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s"><svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><line x1='12' y1='5' x2='12' y2='19'/><line x1='5' y1='12' x2='19' y2='12'/></svg> Nuevo Gasto</button>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Ingresos Últimos 12 Meses</span>
          <span class="panel-badge">Mensual</span>
        </div>
        <ul class="revenue-list" id="revenueList">
          <li class="revenue-item"><span class="revenue-month">Cargando...</span></li>
        </ul>
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();
    async function loadDashboard() {
      try {
        const res = await fetch('/api/reports/dashboard');
        const data = await res.json();
        document.getElementById('totalRevenue').textContent  = `$${data.revenue.toFixed(2)}`;
        document.getElementById('totalExpenses').textContent = `$${(data.totalExpenses||0).toFixed(2)}`;
        const net = data.netIncome ?? data.revenue;
        const netEl = document.getElementById('netIncome');
        netEl.textContent = `$${net.toFixed(2)}`;
        netEl.style.color = net >= 0 ? '#6ee7b7' : '#fca5a5';
        document.getElementById('pendingInvoices').textContent = data.pendingInvoices;
        const list = document.getElementById('revenueList');
        list.innerHTML = data.monthlyRevenue.length === 0
          ? '<li class="empty-state"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>Sin datos aún</li>'
          : data.monthlyRevenue.map(i => `<li class="revenue-item"><span class="revenue-month">${i.month}</span><span class="revenue-amount">$${parseFloat(i.total).toFixed(2)}</span></li>`).join('');
      } catch(e) { console.error(e); }
    }
    async function loadUser() {
      try {
        const res = await fetch('/api/auth/me');
        const u = await res.json();
        document.getElementById('userEmail').textContent = u.email;
      } catch(e) {}
    }
    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/accounting/login';
    }
    loadDashboard(); loadUser();
  </script>
</body>
</html>
