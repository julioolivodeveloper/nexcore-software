<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Contabilidad</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fa;
      color: #333;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      overflow-y: auto;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .nav-menu {
      list-style: none;
    }

    .nav-item {
      margin-bottom: 10px;
    }

    .nav-link {
      display: block;
      padding: 12px;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s;
    }

    .nav-link:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .nav-link.active {
      background: rgba(255, 255, 255, 0.3);
      font-weight: bold;
    }

    .logout-btn {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
      width: calc(100% - 40px);
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: white;
      padding: 20px 30px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
    }

    .header h1 {
      font-size: 24px;
      color: #333;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
    }

    .card-value {
      font-size: 32px;
      font-weight: bold;
      color: #667eea;
      margin: 10px 0;
    }

    .card-label {
      color: #999;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-icon {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .chart-section {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .chart-section h2 {
      font-size: 18px;
      margin-bottom: 20px;
      color: #333;
    }

    .revenue-list {
      list-style: none;
    }

    .revenue-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }

    .revenue-item:last-child {
      border-bottom: none;
    }

    .revenue-item .month {
      color: #666;
    }

    .revenue-item .amount {
      font-weight: bold;
      color: #27ae60;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 200px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .header {
        flex-direction: column;
        gap: 10px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="logo">📊 Contabilidad</div>
      <ul class="nav-menu">
        <li class="nav-item">
          <a href="/accounting/dashboard" class="nav-link active">📈 Dashboard</a>
        </li>
        <li class="nav-item">
          <a href="/accounting/invoices" class="nav-link">📄 Facturas</a>
        </li>
        <li class="nav-item">
          <a href="/accounting/clients" class="nav-link">👥 Clientes</a>
        </li>
        <li class="nav-item">
          <a href="/accounting/reports" class="nav-link">📋 Reportes</a>
        </li>
      </ul>
      <button class="logout-btn" onclick="logout()">🚪 Cerrar Sesión</button>
    </aside>

    <main class="main">
      <header class="header">
        <h1>Dashboard</h1>
        <div class="user-info" id="userInfo"></div>
      </header>

      <div class="content">
        <div class="grid">
          <div class="card">
            <div class="card-icon">📊</div>
            <div class="card-label">Ingresos Totales</div>
            <div class="card-value" id="totalRevenue">$0</div>
          </div>
          <div class="card">
            <div class="card-icon">📄</div>
            <div class="card-label">Total Facturas</div>
            <div class="card-value" id="totalInvoices">0</div>
          </div>
          <div class="card">
            <div class="card-icon">👥</div>
            <div class="card-label">Clientes</div>
            <div class="card-value" id="totalClients">0</div>
          </div>
          <div class="card">
            <div class="card-icon">⏳</div>
            <div class="card-label">Pendientes</div>
            <div class="card-value" id="pendingInvoices">0</div>
          </div>
        </div>

        <div class="chart-section">
          <h2>Ingresos Últimos 12 Meses</h2>
          <ul class="revenue-list" id="revenueList">
            <li class="revenue-item">
              <span>Cargando...</span>
            </li>
          </ul>
        </div>
      </div>
    </main>
  </div>

  <script>
    async function loadDashboard() {
      try {
        const response = await fetch('/api/reports/dashboard');
        const data = await response.json();

        document.getElementById('totalRevenue').textContent = `$${data.revenue.toFixed(2)}`;
        document.getElementById('totalInvoices').textContent = data.totalInvoices;
        document.getElementById('totalClients').textContent = data.totalClients;
        document.getElementById('pendingInvoices').textContent = data.pendingInvoices;

        const revenueList = document.getElementById('revenueList');
        revenueList.innerHTML = '';

        if (data.monthlyRevenue.length === 0) {
          revenueList.innerHTML = '<li class="revenue-item"><span>Sin datos</span></li>';
        } else {
          data.monthlyRevenue.forEach(item => {
            const li = document.createElement('li');
            li.className = 'revenue-item';
            li.innerHTML = `
              <span class="month">${item.month}</span>
              <span class="amount">$${parseFloat(item.total).toFixed(2)}</span>
            `;
            revenueList.appendChild(li);
          });
        }
      } catch (err) {
        console.error('Error:', err);
      }
    }

    async function loadUserInfo() {
      try {
        const response = await fetch('/api/auth/me');
        const user = await response.json();
        document.getElementById('userInfo').innerHTML = `👤 ${user.email}`;
      } catch (err) {
        console.error('Error:', err);
      }
    }

    async function logout() {
      try {
        await fetch('/api/auth/logout', { method: 'POST' });
        window.location.href = '/accounting/login';
      } catch (err) {
        console.error('Error:', err);
      }
    }

    window.addEventListener('load', () => {
      loadDashboard();
      loadUserInfo();
    });
  </script>
</body>
</html>
