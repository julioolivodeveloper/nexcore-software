<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes - Contabilidad</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fa;
      color: #333;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      overflow-y: auto;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .nav-menu {
      list-style: none;
    }

    .nav-item {
      margin-bottom: 10px;
    }

    .nav-link {
      display: block;
      padding: 12px;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s;
    }

    .nav-link:hover, .nav-link.active {
      background: rgba(255, 255, 255, 0.2);
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: white;
      padding: 20px 30px;
      border-bottom: 1px solid #e0e0e0;
    }

    .header h1 {
      font-size: 24px;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .card-label {
      color: #999;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .card-value {
      font-size: 28px;
      font-weight: bold;
      color: #667eea;
    }

    .report-section {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }

    .report-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #f5f7fa;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: #666;
      border-bottom: 2px solid #e0e0e0;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #e0e0e0;
    }

    tr:hover {
      background: #f9f9f9;
    }

    .logout-btn {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: calc(100% - 40px);
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="logo">📊 Contabilidad</div>
      <ul class="nav-menu">
        <li class="nav-item"><a href="/accounting/dashboard" class="nav-link">📈 Dashboard</a></li>
        <li class="nav-item"><a href="/accounting/invoices" class="nav-link">📄 Facturas</a></li>
        <li class="nav-item"><a href="/accounting/clients" class="nav-link">👥 Clientes</a></li>
        <li class="nav-item"><a href="/accounting/reports" class="nav-link active">📋 Reportes</a></li>
      </ul>
      <button class="logout-btn" onclick="logout()">🚪 Cerrar Sesión</button>
    </aside>

    <main class="main">
      <header class="header">
        <h1>Reportes</h1>
      </header>

      <div class="content">
        <div class="grid">
          <div class="card">
            <div class="card-label">Ingresos Totales</div>
            <div class="card-value" id="totalRevenue">$0.00</div>
          </div>
          <div class="card">
            <div class="card-label">Facturas Pagadas</div>
            <div class="card-value" id="paidInvoices">0</div>
          </div>
          <div class="card">
            <div class="card-label">Clientes Activos</div>
            <div class="card-value" id="activeClients">0</div>
          </div>
        </div>

        <div class="report-section">
          <div class="report-title">Clientes Principales</div>
          <table>
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Facturas</th>
                <th>Total Gastado</th>
              </tr>
            </thead>
            <tbody id="topClientsBody">
              <tr><td colspan="3" style="text-align: center; color: #999;">Cargando...</td></tr>
            </tbody>
          </table>
        </div>

        <div class="report-section">
          <div class="report-title">Ingresos por Período</div>
          <table>
            <thead>
              <tr>
                <th>Período</th>
                <th>Facturas</th>
                <th>Subtotal</th>
                <th>IVA</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody id="revenueBody">
              <tr><td colspan="5" style="text-align: center; color: #999;">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    async function loadReports() {
      try {
        const dashResponse = await fetch('/api/reports/dashboard');
        const dashboard = await dashResponse.json();

        document.getElementById('totalRevenue').textContent = `$${parseFloat(dashboard.revenue).toFixed(2)}`;
        document.getElementById('paidInvoices').textContent = dashboard.totalInvoices;
        document.getElementById('activeClients').textContent = dashboard.totalClients;

        // Top clients
        const topClientsResponse = await fetch('/api/reports/clients/top');
        const topClients = await topClientsResponse.json();

        const topClientsBody = document.getElementById('topClientsBody');
        if (topClients.length === 0) {
          topClientsBody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #999;">Sin datos</td></tr>';
        } else {
          topClientsBody.innerHTML = topClients.map(client => `
            <tr>
              <td>${client.name}</td>
              <td>${client.invoice_count}</td>
              <td>$${parseFloat(client.total_spent).toFixed(2)}</td>
            </tr>
          `).join('');
        }

        // Revenue by period
        const revenueResponse = await fetch('/api/reports/revenue?period=month');
        const revenue = await revenueResponse.json();

        const revenueBody = document.getElementById('revenueBody');
        if (revenue.length === 0) {
          revenueBody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #999;">Sin datos</td></tr>';
        } else {
          revenueBody.innerHTML = revenue.map(item => `
            <tr>
              <td>${item.period}</td>
              <td>${item.invoice_count}</td>
              <td>$${parseFloat(item.subtotal).toFixed(2)}</td>
              <td>$${parseFloat(item.tax).toFixed(2)}</td>
              <td><strong>$${parseFloat(item.total).toFixed(2)}</strong></td>
            </tr>
          `).join('');
        }
      } catch (err) {
        console.error('Error:', err);
      }
    }

    async function logout() {
      try {
        await fetch('/api/auth/logout', { method: 'POST' });
        window.location.href = '/accounting/login';
      } catch (err) {
        console.error('Error:', err);
      }
    }

    window.addEventListener('load', loadReports);
  </script>
</body>
</html>
