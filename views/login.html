<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contabilidad - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      padding: 40px;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 5px;
    }

    .logo p {
      color: #999;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .error {
      color: #e74c3c;
      font-size: 14px;
      margin-top: 10px;
      padding: 10px;
      background: #fadbd8;
      border-radius: 5px;
      display: none;
    }

    .success {
      color: #27ae60;
      font-size: 14px;
      margin-top: 10px;
      padding: 10px;
      background: #d5f4e6;
      border-radius: 5px;
      display: none;
    }

    .loading {
      display: none;
      text-align: center;
      color: #999;
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .form-footer {
      text-align: center;
      margin-top: 20px;
      color: #999;
      font-size: 13px;
    }

    .credentials {
      background: #f0f3ff;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .credentials strong {
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>Contabilidad</h1>
      <p>Sistema Privado de Facturación</p>
    </div>

    <div class="credentials">
      <strong>Acceso Admin:</strong><br>
      📧 jojulioneto1@gmail.com<br>
      🔒 Julioolivo94@
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" name="email" required placeholder="tu@email.com">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required placeholder="••••••••">
      </div>

      <button type="submit" class="btn">
        <span class="spinner loading"></span>
        <span class="btn-text">Iniciar Sesión</span>
      </button>

      <div class="error" id="errorMsg"></div>
      <div class="success" id="successMsg"></div>
      <div class="loading" id="loadingMsg">
        <div class="spinner"></div> Verificando...
      </div>
    </form>

    <div class="form-footer">
      Sistema de contabilidad privado para Nexcore Software
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const loadingMsg = document.getElementById('loadingMsg');
    const spinner = document.querySelector('.spinner');
    const btnText = document.querySelector('.btn-text');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      spinner.style.display = 'inline-block';
      btnText.textContent = 'Verificando...';
      form.querySelector('button').disabled = true;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          successMsg.textContent = '✓ Sesión iniciada. Redirigiendo...';
          successMsg.style.display = 'block';
          setTimeout(() => {
            window.location.href = '/accounting/dashboard';
          }, 1000);
        } else {
          errorMsg.textContent = '✗ ' + data.error;
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = '✗ Error de conexión';
        errorMsg.style.display = 'block';
      } finally {
        spinner.style.display = 'none';
        btnText.textContent = 'Iniciar Sesión';
        form.querySelector('button').disabled = false;
      }
    });
  </script>
</body>
</html>
