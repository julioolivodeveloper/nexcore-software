<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistente — Contabilidad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #2563eb; --purple-l: #60a5fa; --cyan: #06b6d4; --green: #10b981;
      --yellow: #f59e0b; --red: #ef4444;
      --bg: #07070f; --bg2: #0e0e1c; --bg3: #13132a; --bg4: #1a1a2e;
      --border: rgba(255,255,255,0.07); --text-muted: #94a3b8; --radius: 16px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: #e2e8f0; display: flex; height: 100vh; overflow: hidden; }

    /* SIDEBAR */
    .sidebar { width: 240px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 16px; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 8px 24px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .logo-hex { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--purple), var(--cyan)); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .sidebar-logo span { font-family: 'Space Grotesk', sans-serif; font-size: .95rem; font-weight: 700; color: #fff; }
    .nav-section-label { font-size: .68rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #475569; padding: 0 8px; margin-bottom: 6px; }
    .nav-menu { list-style: none; display: flex; flex-direction: column; gap: 2px; margin-bottom: 20px; }
    .nav-link { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; color: var(--text-muted); font-size: .875rem; font-weight: 500; text-decoration: none; transition: background .2s, color .2s; }
    .nav-link svg { width: 17px; height: 17px; flex-shrink: 0; }
    .nav-link:hover { background: rgba(255,255,255,.05); color: #e2e8f0; }
    .nav-link.active { background: rgba(37,99,235,.15); color: var(--purple-l); border: 1px solid rgba(37,99,235,.2); }
    .sidebar-footer { margin-top: auto; }
    .logout-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; border-radius: 10px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-size: .875rem; font-weight: 500; cursor: pointer; transition: background .2s, color .2s; }
    .logout-btn svg { width: 17px; height: 17px; }
    .logout-btn:hover { background: rgba(239,68,68,.08); border-color: rgba(239,68,68,.25); color: #fca5a5; }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 700; }
    .bot-status { display: flex; align-items: center; gap: 6px; font-size: .78rem; color: #6ee7b7; font-weight: 500; }
    .bot-dot { width: 7px; height: 7px; border-radius: 50%; background: #10b981; box-shadow: 0 0 6px #10b981; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .user-badge { display: flex; align-items: center; gap: 8px; padding: 7px 14px; border-radius: 999px; background: rgba(255,255,255,.04); border: 1px solid var(--border); font-size: .8rem; color: var(--text-muted); }
    .user-badge svg { width: 14px; height: 14px; color: var(--purple-l); }

    /* CHAT AREA */
    .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .messages { flex: 1; overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 16px; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }

    /* MESSAGE BUBBLES */
    .msg { display: flex; gap: 10px; max-width: 80%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }
    .msg-avatar { width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .msg.bot  .msg-avatar { background: linear-gradient(135deg, var(--purple), var(--cyan)); }
    .msg.user .msg-avatar { background: rgba(255,255,255,.08); border: 1px solid var(--border); }
    .msg-avatar svg { width: 15px; height: 15px; }
    .msg-body { display: flex; flex-direction: column; gap: 4px; }
    .msg.user .msg-body { align-items: flex-end; }
    .bubble {
      padding: 11px 16px; border-radius: 14px; font-size: .875rem; line-height: 1.55;
      max-width: 560px; word-wrap: break-word;
    }
    .msg.bot  .bubble { background: var(--bg2); border: 1px solid var(--border); color: #e2e8f0; border-top-left-radius: 4px; }
    .msg.user .bubble { background: rgba(37,99,235,.2); border: 1px solid rgba(37,99,235,.25); color: #e2e8f0; border-top-right-radius: 4px; }
    .msg-time { font-size: .68rem; color: #475569; }

    /* TYPING INDICATOR */
    .typing-dots { display: flex; gap: 4px; padding: 14px 16px; }
    .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); animation: bounce .9s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }

    /* CARD (invoice/expense preview) */
    .card-msg { background: var(--bg3); border: 1px solid rgba(37,99,235,.25); border-radius: 14px; padding: 16px; width: 360px; }
    .card-msg.expense-card { border-color: rgba(239,68,68,.25); }
    .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .card-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .card-icon svg { width: 14px; height: 14px; }
    .ci-blue  { background: rgba(37,99,235,.2); color: var(--purple-l); }
    .ci-red   { background: rgba(239,68,68,.15); color: #fca5a5; }
    .card-title { font-family: 'Space Grotesk', sans-serif; font-size: .9rem; font-weight: 700; }
    .card-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: .82rem; }
    .card-row-label { color: var(--text-muted); }
    .card-row-val { font-weight: 600; font-family: 'Space Grotesk', sans-serif; }
    .card-amount { font-size: 1.3rem; font-weight: 700; font-family: 'Space Grotesk', sans-serif; color: #6ee7b7; margin: 10px 0 14px; }
    .card-amount.expense { color: #fca5a5; }
    .card-actions { display: flex; gap: 8px; margin-top: 14px; }
    .btn-confirm { flex: 1; padding: 9px; border-radius: 9px; border: none; background: rgba(16,185,129,.15); border: 1px solid rgba(16,185,129,.3); color: #6ee7b7; font-size: .82rem; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; transition: background .2s; }
    .btn-confirm:hover { background: rgba(16,185,129,.25); }
    .btn-cancel { flex: 1; padding: 9px; border-radius: 9px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: .82rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: background .2s; }
    .btn-cancel:hover { background: rgba(255,255,255,.05); }

    /* CLIENT PICKER */
    .client-picker { display: flex; flex-direction: column; gap: 6px; width: 320px; }
    .client-opt { padding: 9px 14px; border-radius: 9px; border: 1px solid var(--border); background: var(--bg3); color: #e2e8f0; font-size: .83rem; font-weight: 500; cursor: pointer; text-align: left; transition: background .2s, border-color .2s; font-family: 'Inter', sans-serif; }
    .client-opt:hover { background: rgba(37,99,235,.12); border-color: rgba(37,99,235,.25); color: var(--purple-l); }

    /* RESULT CARD (after create) */
    .result-card { background: rgba(16,185,129,.08); border: 1px solid rgba(16,185,129,.25); border-radius: 14px; padding: 14px 16px; width: 320px; }
    .result-card.fail { background: rgba(239,68,68,.08); border-color: rgba(239,68,68,.25); }
    .result-title { font-size: .9rem; font-weight: 700; color: #6ee7b7; margin-bottom: 8px; display: flex; align-items: center; gap: 7px; }
    .result-title svg { width: 16px; height: 16px; }
    .result-title.fail { color: #fca5a5; }
    .result-info { font-size: .8rem; color: var(--text-muted); margin-bottom: 12px; }
    .btn-pdf { display: flex; align-items: center; justify-content: center; gap: 7px; padding: 9px 16px; border-radius: 9px; background: rgba(37,99,235,.15); border: 1px solid rgba(37,99,235,.25); color: var(--purple-l); font-size: .82rem; font-weight: 700; cursor: pointer; text-decoration: none; font-family: 'Inter', sans-serif; transition: background .2s; }
    .btn-pdf:hover { background: rgba(37,99,235,.25); }
    .btn-pdf svg { width: 14px; height: 14px; }

    /* QUICK COMMANDS */
    .quick-bar { display: flex; gap: 7px; padding: 10px 28px; overflow-x: auto; flex-shrink: 0; }
    .quick-bar::-webkit-scrollbar { height: 0; }
    .quick-chip { display: flex; align-items: center; gap: 6px; padding: 6px 13px; border-radius: 999px; border: 1px solid var(--border); background: var(--bg2); color: var(--text-muted); font-size: .78rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all .2s; font-family: 'Inter', sans-serif; flex-shrink: 0; }
    .quick-chip:hover { background: rgba(37,99,235,.1); border-color: rgba(37,99,235,.25); color: var(--purple-l); }
    .quick-chip svg { width: 13px; height: 13px; }

    /* INPUT */
    .input-area { padding: 14px 28px 20px; background: var(--bg2); border-top: 1px solid var(--border); flex-shrink: 0; }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    .chat-input {
      flex: 1; padding: 13px 16px; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 12px; color: #e2e8f0; font-size: .875rem; font-family: 'Inter', sans-serif;
      outline: none; resize: none; max-height: 120px; min-height: 46px; line-height: 1.4;
      transition: border-color .2s;
    }
    .chat-input:focus { border-color: rgba(37,99,235,.4); }
    .chat-input::placeholder { color: #475569; }
    .send-btn { width: 46px; height: 46px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--purple), #1d4ed8); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity .2s; flex-shrink: 0; }
    .send-btn:hover { opacity: .85; }
    .send-btn svg { width: 18px; height: 18px; }
    .send-btn:disabled { opacity: .4; cursor: default; }

    /* HELP TABLE */
    .help-table { width: 100%; font-size: .8rem; border-collapse: collapse; }
    .help-table tr td { padding: 5px 8px; }
    .help-table tr td:first-child { color: var(--purple-l); font-weight: 600; font-family: 'Space Grotesk', sans-serif; }
    .help-table tr td:last-child { color: var(--text-muted); }

    /* INVOICE LIST */
    .inv-list { display: flex; flex-direction: column; gap: 5px; width: 360px; }
    .inv-item { display: flex; justify-content: space-between; padding: 9px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 9px; font-size: .82rem; }
    .inv-item-left { display: flex; flex-direction: column; gap: 2px; }
    .inv-item-client { font-weight: 600; color: #e2e8f0; }
    .inv-item-date { color: var(--text-muted); font-size: .75rem; }
    .inv-item-amt { font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: #6ee7b7; align-self: center; }
  </style>

  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Contabilidad">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#0e0e1c">
</head>
<body>
  <div class="mob-overlay" id="mobOverlay" onclick="closeSidebar()"></div>
  <script src="/accounting-mobile.js"></script>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-hex">⬡</div>
      <span>Contabilidad</span>
    </div>
    <div class="nav-section-label">Menú</div>
    <ul class="nav-menu">
      <li><a href="/accounting/dashboard"   class="nav-link"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
      <li><a href="/accounting/invoices"    class="nav-link"><i data-lucide="file-text"></i> Facturas</a></li>
      <li><a href="/accounting/clients"     class="nav-link"><i data-lucide="users"></i> Clientes</a></li>
      <li><a href="/accounting/expenses"    class="nav-link"><i data-lucide="credit-card"></i> Gastos</a></li>
      <li><a href="/accounting/financials"  class="nav-link"><i data-lucide="trending-up"></i> Financiero</a></li>
      <li><a href="/accounting/reports"     class="nav-link"><i data-lucide="bar-chart-2"></i> Reportes</a></li>
      <li><a href="/accounting/chat"        class="nav-link active"><i data-lucide="message-circle"></i> Asistente</a></li>
    </ul>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()"><i data-lucide="log-out"></i> Cerrar Sesión</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menu"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="topbar-left">
        <h1>Asistente</h1>
        <div class="bot-status"><span class="bot-dot"></span> En línea</div>
      </div>
      <div class="user-badge"><i data-lucide="user"></i><span id="userEmail">—</span></div>
    </div>

    <div class="chat-container">
      <div class="messages" id="messages"></div>

      <div class="quick-bar">
        <button class="quick-chip" onclick="send('nueva factura')"><i data-lucide="file-plus"></i> Nueva Factura</button>
        <button class="quick-chip" onclick="send('nuevo gasto')"><i data-lucide="credit-card"></i> Nuevo Gasto</button>
        <button class="quick-chip" onclick="send('balance')"><i data-lucide="activity"></i> Balance</button>
        <button class="quick-chip" onclick="send('últimas facturas')"><i data-lucide="list"></i> Últimas Facturas</button>
        <button class="quick-chip" onclick="send('clientes')"><i data-lucide="users"></i> Clientes</button>
        <button class="quick-chip" onclick="send('ayuda')"><i data-lucide="help-circle"></i> Ayuda</button>
      </div>

      <div class="input-area">
        <div class="input-row">
          <textarea id="chatInput" class="chat-input" placeholder="Ej: factura para Zoila Camacho por $220 servicios de diseño..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendInput()"><i data-lucide="send"></i></button>
        </div>
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();

    let clients = [];
    let pendingAction = null; // { type, data }
    let isTyping = false;

    const today = () => new Date().toISOString().split('T')[0];
    const dueDate = () => { const d = new Date(); d.setDate(d.getDate()+30); return d.toISOString().split('T')[0]; };
    const fmt = n => '$' + parseFloat(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    const now = () => new Date().toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit'});

    async function init() {
      try {
        const [cr, ur] = await Promise.all([fetch('/api/clients'), fetch('/api/auth/me')]);
        clients = await cr.json();
        const u = await ur.json();
        document.getElementById('userEmail').textContent = u.email;
      } catch(e) {}
      botGreet();
    }

    function botGreet() {
      addBotMsg(`Hola, soy tu asistente contable. Puedo registrar facturas, gastos y consultar tu información.

Algunos ejemplos de lo que puedes decirme:
• <i>"Factura para Zoila Camacho por $220"</i>
• <i>"Gasto de $150 en Meta Ads"</i>
• <i>"Balance del sistema"</i>

¿En qué te ayudo?`);
    }

    // ── RENDER ─────────────────────────────────────────────────────────────────

    function addUserMsg(text) {
      const el = msgEl('user');
      el.querySelector('.bubble').textContent = text;
      el.querySelector('.msg-time').textContent = now();
      append(el);
    }

    function addBotMsg(html, extra) {
      const el = msgEl('bot');
      el.querySelector('.bubble').innerHTML = html;
      el.querySelector('.msg-time').textContent = now();
      if (extra) el.querySelector('.msg-body').appendChild(extra);
      append(el);
      lucide.createIcons();
    }

    function addBotRaw(node) {
      const wrap = document.createElement('div');
      wrap.className = 'msg bot';
      wrap.innerHTML = `<div class="msg-avatar"><i data-lucide="bot"></i></div><div class="msg-body"></div>`;
      wrap.querySelector('.msg-body').appendChild(node);
      append(wrap);
      lucide.createIcons();
    }

    function msgEl(type) {
      const el = document.createElement('div');
      el.className = 'msg ' + type;
      el.innerHTML = type === 'user'
        ? `<div class="msg-avatar"><i data-lucide="user"></i></div><div class="msg-body"><div class="bubble"></div><span class="msg-time"></span></div>`
        : `<div class="msg-avatar"><i data-lucide="bot"></i></div><div class="msg-body"><div class="bubble"></div><span class="msg-time"></span></div>`;
      return el;
    }

    function append(el) {
      const m = document.getElementById('messages');
      m.appendChild(el);
      m.scrollTop = m.scrollHeight;
    }

    function showTyping() {
      const el = document.createElement('div');
      el.className = 'msg bot'; el.id = 'typingEl';
      el.innerHTML = `<div class="msg-avatar"><i data-lucide="bot"></i></div><div class="msg-body"><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
      append(el);
      lucide.createIcons();
    }
    function hideTyping() { const el = document.getElementById('typingEl'); if(el) el.remove(); }

    function botReply(fn, delay=600) {
      showTyping();
      setTimeout(() => { hideTyping(); fn(); }, delay);
    }

    // ── INPUT ──────────────────────────────────────────────────────────────────

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendInput(); }
    }
    function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

    function send(text) { addUserMsg(text); parse(text.toLowerCase().trim()); }

    function sendInput() {
      const inp = document.getElementById('chatInput');
      const text = inp.value.trim();
      if (!text) return;
      inp.value = ''; inp.style.height = 'auto';
      addUserMsg(text);
      parse(text.toLowerCase().trim());
    }

    // ── PARSER ─────────────────────────────────────────────────────────────────

    function parse(raw) {
      // If waiting for confirmation
      if (pendingAction) {
        handlePendingReply(raw); return;
      }

      // AMOUNT extraction helper
      const amountMatch = raw.match(/\$?\s*([\d,]+(?:\.\d{1,2})?)/);
      const amount = amountMatch ? parseFloat(amountMatch[1].replace(/,/g,'')) : null;

      // ── AYUDA
      if (/ayuda|help|que puedes|comandos|instrucciones/.test(raw)) {
        botReply(() => showHelp());
        return;
      }

      // ── BALANCE / RESUMEN
      if (/balance|resumen|cu[aá]nto gan[eé]|gane|total ingres|gananc/.test(raw)) {
        botReply(() => showBalance());
        return;
      }

      // ── CLIENTES
      if (/^clientes?$|lista.*clientes?|todos.*clientes?/.test(raw)) {
        botReply(() => showClients());
        return;
      }

      // ── ÚLTIMAS FACTURAS
      if (/[uú]ltimas?\s*facturas?|facturas?\s*recientes?|ver facturas?|mostrar facturas?/.test(raw)) {
        const nMatch = raw.match(/(\d+)/);
        const n = nMatch ? parseInt(nMatch[1]) : 8;
        botReply(() => showLastInvoices(n));
        return;
      }

      // ── ÚLTIMOS GASTOS
      if (/[uú]ltimos?\s*gastos?|gastos?\s*recientes?|ver gastos?/.test(raw)) {
        botReply(() => showLastExpenses());
        return;
      }

      // ── NUEVA FACTURA (solo trigger)
      if (/^nueva factura$|crear factura$|^factura$/.test(raw)) {
        botReply(() => addBotMsg('Claro. Dime para quién y por cuánto.<br><i>Ejemplo: "factura para Zoila por $220 diseño de logo"</i>'));
        return;
      }

      // ── NUEVO GASTO (solo trigger)
      if (/^nuevo gasto$|registrar gasto$|^gasto$/.test(raw)) {
        botReply(() => addBotMsg('De acuerdo. ¿Cuánto y en qué?<br><i>Ejemplo: "gasto de $150 en Meta Ads"</i>'));
        return;
      }

      // ── GASTO detectado con monto
      if (amount && /gasto|pag[ué]e?|compré|meta ads?|facebook|suscripci[oó]n|adobe|software|herramienta|oficina|gasolina|uber|impuesto/.test(raw)) {
        const desc = extractExpenseDesc(raw);
        const cat  = detectExpenseCat(raw);
        botReply(() => showExpenseCard({ amount, description: desc, category: cat, date: today() }));
        return;
      }

      // ── FACTURA detectada con monto
      if (amount && /factura|cobr[ée]|vend[ií]|ingres[oo]|pago de|me pag[oó]|venta/.test(raw)) {
        const desc = detectServiceDesc(raw);
        const clientHint = extractClientHint(raw);
        buildInvoice(amount, desc, clientHint);
        return;
      }

      // ── Intento libre con monto y posible cliente
      if (amount) {
        const desc = detectServiceDesc(raw);
        const clientHint = extractClientHint(raw);
        if (clientHint) {
          buildInvoice(amount, desc, clientHint);
        } else {
          botReply(() => addBotMsg(`Detecté un monto de <b>${fmt(amount)}</b>. ¿Esto es una <b>factura</b> o un <b>gasto</b>?`));
        }
        return;
      }

      botReply(() => addBotMsg(`No entendí eso. Escribe <b>ayuda</b> para ver los comandos disponibles.`));
    }

    // ── INVOICE FLOW ───────────────────────────────────────────────────────────

    function buildInvoice(amount, desc, clientHint) {
      if (!clientHint) {
        botReply(() => addBotMsg(`¿Para qué cliente es la factura de <b>${fmt(amount)}</b>? Escribe el nombre.`));
        pendingAction = { type: 'need_client_for_invoice', data: { amount, desc } };
        return;
      }
      const matches = fuzzyClients(clientHint);
      if (matches.length === 0) {
        botReply(() => addBotMsg(`No encontré un cliente con "<b>${clientHint}</b>". Escribe el nombre exacto o <b>clientes</b> para ver la lista.`));
        pendingAction = { type: 'need_client_for_invoice', data: { amount, desc } };
        return;
      }
      if (matches.length === 1) {
        botReply(() => showInvoiceCard({ client_name: matches[0].name, amount, desc }));
        return;
      }
      // Multiple matches
      botReply(() => {
        addBotMsg(`Encontré ${matches.length} clientes con "<b>${clientHint}</b>". ¿Cuál?`);
        const picker = document.createElement('div');
        picker.className = 'client-picker';
        matches.slice(0,5).forEach(c => {
          const btn = document.createElement('button');
          btn.className = 'client-opt'; btn.textContent = c.name;
          btn.onclick = () => {
            pendingAction = null;
            addUserMsg(c.name);
            botReply(() => showInvoiceCard({ client_name: c.name, amount, desc }));
          };
          picker.appendChild(btn);
        });
        addBotRaw(picker);
        lucide.createIcons();
      });
    }

    function showInvoiceCard(d) {
      const card = document.createElement('div');
      card.className = 'card-msg';
      card.innerHTML = `
        <div class="card-header">
          <div class="card-icon ci-blue"><i data-lucide="file-text"></i></div>
          <div class="card-title">Vista Previa — Nueva Factura</div>
        </div>
        <div class="card-row"><span class="card-row-label">Cliente</span><span class="card-row-val">${d.client_name}</span></div>
        <div class="card-row"><span class="card-row-label">Descripción</span><span class="card-row-val">${d.desc}</span></div>
        <div class="card-row"><span class="card-row-label">Fecha emisión</span><span class="card-row-val">${today()}</span></div>
        <div class="card-row"><span class="card-row-label">Vencimiento</span><span class="card-row-val">${dueDate()}</span></div>
        <div class="card-row"><span class="card-row-label">Estado</span><span class="card-row-val" style="color:#6ee7b7">Pagada</span></div>
        <div class="card-amount">${fmt(d.amount)}</div>
        <div class="card-actions">
          <button class="btn-confirm" id="confirmInv">✓ Crear factura</button>
          <button class="btn-cancel"  id="cancelInv">✗ Cancelar</button>
        </div>`;
      addBotRaw(card);
      lucide.createIcons();
      pendingAction = { type: 'confirm_invoice', data: d };
      document.getElementById('confirmInv').onclick = () => confirmInvoice(d);
      document.getElementById('cancelInv').onclick  = () => cancelAction();
    }

    async function confirmInvoice(d) {
      pendingAction = null;
      disableButtons();
      showTyping();
      try {
        const res = await fetch('/api/invoices', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            client_name: d.client_name,
            issue_date:  today(),
            due_date:    dueDate(),
            status:      'paid',
            total:       d.amount,
            notes:       '',
            items:       [{ description: d.desc, quantity: 1, unit_price: d.amount }]
          })
        });
        const inv = await res.json();
        hideTyping();
        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `
          <div class="result-title"><i data-lucide="check-circle-2"></i> Factura #${String(inv.id).padStart(4,'0')} creada</div>
          <div class="result-info">Cliente: <b>${inv.client_name}</b> · Monto: <b>${fmt(inv.total)}</b></div>
          <a class="btn-pdf" href="/api/invoices/${inv.id}/pdf" target="_blank"><i data-lucide="file-text"></i> Ver / Imprimir PDF</a>`;
        addBotRaw(card);
        lucide.createIcons();
      } catch(e) {
        hideTyping();
        addBotMsg('Ocurrió un error al crear la factura. Intenta de nuevo.');
      }
    }

    // ── EXPENSE FLOW ───────────────────────────────────────────────────────────

    function showExpenseCard(d) {
      const card = document.createElement('div');
      card.className = 'card-msg expense-card';
      card.innerHTML = `
        <div class="card-header">
          <div class="card-icon ci-red"><i data-lucide="credit-card"></i></div>
          <div class="card-title">Vista Previa — Nuevo Gasto</div>
        </div>
        <div class="card-row"><span class="card-row-label">Descripción</span><span class="card-row-val">${d.description}</span></div>
        <div class="card-row"><span class="card-row-label">Categoría</span><span class="card-row-val">${d.category}</span></div>
        <div class="card-row"><span class="card-row-label">Fecha</span><span class="card-row-val">${d.date}</span></div>
        <div class="card-amount expense">${fmt(d.amount)}</div>
        <div class="card-actions">
          <button class="btn-confirm" id="confirmExp" style="background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:#fca5a5">✓ Registrar gasto</button>
          <button class="btn-cancel"  id="cancelExp">✗ Cancelar</button>
        </div>`;
      addBotRaw(card);
      lucide.createIcons();
      pendingAction = { type: 'confirm_expense', data: d };
      document.getElementById('confirmExp').onclick = () => confirmExpense(d);
      document.getElementById('cancelExp').onclick  = () => cancelAction();
    }

    async function confirmExpense(d) {
      pendingAction = null;
      disableButtons();
      showTyping();
      try {
        const res = await fetch('/api/expenses', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: d.date, category: d.category, description: d.description, amount: d.amount, method: '', notes: '' })
        });
        const exp = await res.json();
        hideTyping();
        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `
          <div class="result-title"><i data-lucide="check-circle-2"></i> Gasto registrado</div>
          <div class="result-info"><b>${exp.description}</b> · Categoría: <b>${exp.category}</b> · <b>${fmt(exp.amount)}</b></div>`;
        addBotRaw(card);
        lucide.createIcons();
      } catch(e) {
        hideTyping();
        addBotMsg('Error al registrar el gasto. Intenta de nuevo.');
      }
    }

    function cancelAction() {
      pendingAction = null;
      disableButtons();
      botReply(() => addBotMsg('Operación cancelada. ¿En qué más te ayudo?'), 200);
    }

    function handlePendingReply(raw) {
      const pa = pendingAction;
      if (pa.type === 'need_client_for_invoice') {
        pendingAction = null;
        const matches = fuzzyClients(raw);
        if (matches.length === 0) {
          botReply(() => addBotMsg(`No encontré ese cliente. Escribe <b>clientes</b> para ver la lista.`));
          return;
        }
        const client = matches[0];
        botReply(() => showInvoiceCard({ client_name: client.name, amount: pa.data.amount, desc: pa.data.desc }));
        return;
      }
      // If user types text when a card is pending, cancel
      pendingAction = null;
      parse(raw);
    }

    function disableButtons() {
      ['confirmInv','cancelInv','confirmExp','cancelExp'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.disabled = true;
      });
    }

    // ── QUERIES ─────────────────────────────────────────────────────────────────

    async function showBalance() {
      try {
        const res = await fetch('/api/reports/dashboard');
        const d = await res.json();
        const net = d.netIncome ?? d.revenue;
        addBotMsg(`📊 <b>Balance del sistema</b><br><br>
💰 Ingresos totales: <b style="color:#6ee7b7">${fmt(d.revenue)}</b><br>
💳 Gastos totales: <b style="color:#fca5a5">${fmt(d.totalExpenses||0)}</b><br>
📈 Ganancia neta: <b style="color:${net>=0?'#60a5fa':'#fca5a5'}">${fmt(net)}</b><br>
⏳ Facturas pendientes: <b>${d.pendingInvoices}</b>`);
      } catch(e) { addBotMsg('No pude obtener el balance.'); }
    }

    async function showLastInvoices(n=8) {
      try {
        const res = await fetch('/api/invoices');
        const invs = await res.json();
        const paid = invs.filter(i=>i.status==='paid').sort((a,b)=>b.issue_date.localeCompare(a.issue_date)).slice(0,n);
        addBotMsg(`Últimas <b>${paid.length}</b> facturas pagadas:`);
        const list = document.createElement('div'); list.className = 'inv-list';
        paid.forEach(i => {
          const el = document.createElement('div'); el.className = 'inv-item';
          el.innerHTML = `<div class="inv-item-left"><span class="inv-item-client">${i.client_name}</span><span class="inv-item-date">#${String(i.id).padStart(4,'0')} · ${i.issue_date}</span></div><span class="inv-item-amt">${fmt(i.total)}</span>`;
          list.appendChild(el);
        });
        addBotRaw(list);
      } catch(e) { addBotMsg('No pude cargar las facturas.'); }
    }

    async function showLastExpenses() {
      try {
        const res = await fetch('/api/expenses');
        const exps = await res.json();
        const last = exps.slice(0,8);
        addBotMsg(`Últimos <b>${last.length}</b> gastos:`);
        const list = document.createElement('div'); list.className = 'inv-list';
        last.forEach(e => {
          const el = document.createElement('div'); el.className = 'inv-item';
          el.innerHTML = `<div class="inv-item-left"><span class="inv-item-client">${e.description}</span><span class="inv-item-date">${e.category} · ${e.date}</span></div><span class="inv-item-amt" style="color:#fca5a5">${fmt(e.amount)}</span>`;
          list.appendChild(el);
        });
        addBotRaw(list);
      } catch(e) { addBotMsg('No pude cargar los gastos.'); }
    }

    function showClients() {
      const sorted = [...clients].sort((a,b)=>a.name.localeCompare(b.name));
      const list = document.createElement('div'); list.className = 'inv-list';
      sorted.forEach(c => {
        const el = document.createElement('div'); el.className = 'inv-item';
        el.innerHTML = `<span class="inv-item-client">${c.name}</span>`;
        list.appendChild(el);
      });
      addBotMsg(`<b>${clients.length}</b> clientes registrados:`);
      addBotRaw(list);
    }

    function showHelp() {
      addBotMsg(`<b>Comandos disponibles:</b><br><br>
<table class="help-table">
<tr><td>factura para [cliente] por $[monto] [descripción]</td><td>Crea una nueva factura</td></tr>
<tr><td>gasto de $[monto] en [descripción]</td><td>Registra un gasto</td></tr>
<tr><td>balance</td><td>Ver ingresos, gastos y ganancia</td></tr>
<tr><td>últimas facturas</td><td>Ver las últimas 8 facturas</td></tr>
<tr><td>últimos gastos</td><td>Ver los últimos gastos</td></tr>
<tr><td>clientes</td><td>Ver lista de clientes</td></tr>
</table><br>
<i>Puedes hablar de forma natural, no necesitas seguir el formato exacto.</i>`);
    }

    // ── HELPERS ────────────────────────────────────────────────────────────────

    function fuzzyClients(hint) {
      if (!hint || hint.length < 2) return [];
      const h = hint.toLowerCase();
      const words = h.split(/\s+/).filter(w => w.length > 2);
      return clients.filter(c => {
        const n = c.name.toLowerCase();
        return n.includes(h) || words.some(w => n.includes(w));
      });
    }

    function extractClientHint(raw) {
      // Remove common trigger words and amounts to extract client name hint
      let s = raw
        .replace(/\$?\s*[\d,]+(?:\.\d{1,2})?/g, '')
        .replace(/factura|cobr[eé]|vend[ií]|ingreso|para|a |por|de|al|del|venta|pago|nueva|nuevo|registra|crea|me pag[oó]/g, ' ')
        .replace(/marketing|tiktok|software|sistema|logo|diseño|video|edicion|servicios|ads|web|app|p[aá]gina/g, ' ')
        .replace(/\s+/g, ' ').trim();
      return s.length > 2 ? s : null;
    }

    function extractExpenseDesc(raw) {
      let s = raw
        .replace(/\$?\s*[\d,]+(?:\.\d{1,2})?/g, '')
        .replace(/gasto|pagu[eé]|compré|nuevo|de|en|por|registra/g, ' ')
        .replace(/\s+/g, ' ').trim();
      if (!s || s.length < 3) {
        if (/meta|facebook/.test(raw)) return 'Pago de Anuncios de Meta';
        if (/adobe/.test(raw)) return 'Adobe';
        if (/chatgpt|openai/.test(raw)) return 'ChatGPT';
        return 'Gasto';
      }
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function detectServiceDesc(raw) {
      if (/tiktok|tik tok/.test(raw)) return 'Administración TikTok Shop y TikTok Ads';
      if (/marketing|ads|facebook|instagram|publicidad|campa[ñn]a/.test(raw)) return 'Marketing Digital';
      if (/software|sistema|app|web|p[aá]gina|sitio|desarrollo/.test(raw)) return 'Desarrollo de Software';
      if (/logo|dise[ñn]o|imagen|branding|banner/.test(raw)) return 'Diseño de Logos e Imágenes';
      if (/video|edici[oó]n|reels|shorts|montaje/.test(raw)) return 'Edición de Video';
      return 'Servicios';
    }

    function detectExpenseCat(raw) {
      if (/meta|facebook|instagram|ads|publicidad/.test(raw)) return 'Marketing';
      if (/adobe|slack|notion|figma|chatgpt|openai|software|herramienta|suscripci[oó]n/.test(raw)) return 'Software/Herramientas';
      if (/oficina|papeler[ií]a/.test(raw)) return 'Oficina';
      if (/gasolina|uber|transporte|lyft/.test(raw)) return 'Transporte';
      if (/impuesto|tax|irs/.test(raw)) return 'Impuestos';
      return 'Otros';
    }

    async function logout() { await fetch('/api/auth/logout',{method:'POST'}); window.location.href='/accounting/login'; }

    init();
  </script>
</body>
</html>
